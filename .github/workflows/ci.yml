name: Go CI

on:
  push:
    branches-ignore:
      - renovate/**
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+' # Push events to matching v*, i.e. v20.15.10
  pull_request:
    branches:
      - '**'

jobs:

  strongo_workflow:
    permissions:
      contents: write
    # Reusable Go CI workflow: go get/vet/build/test + golangci-lint, and
    # version-bump-and-tag on main. Defaults to CGO_ENABLED=0, which matches
    # codegrapher's single-static-binary / cross-compilation launch requirement
    # (no cgo_enabled override needed — the parser and SQLite driver are pure Go).
    uses: strongo/go-ci-action/.github/workflows/workflow.yml@main

    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
